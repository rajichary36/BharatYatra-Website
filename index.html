<!DOCTYPE html>
<html>
    <head>
        <title>My page</title>
        <style>
            body{
                margin:0;
                font-family: Arial, Helvetica, sans-serif;
            }
            .content{
                position: relative;
            }
            .content img{
                width: 100%;
                height: 100vh;
                object-fit: cover;
            }
            .navbar {
                position: absolute;
                top: 20px;
                right: 50px;
                color: black;
                display: flex;
                gap: 5px;
            }
            .navbar a {
               color: white;
               text-decoration: none;
               margin-left: 20px;
               width: fit-content;
               padding: 10px 18px;
               border-radius: 25px;
               transition: 0.4s;
            }
            .navbar a:hover{
                color: darkorange;
                transform: scale(1.05);
            }
            .section{
                position: absolute;
                top: 50%;
                left: 50%;transform: translate(-50%, -50%);
                text-align: center;
                color: white;
            }
            .section h2{
                font-size: 40px;
            }
        </style>
    </head>
    <body>
        <div class="content">
            <img src="index3.jpg">
            <nav class="navbar">
                <a>Home</a>
                <a href="Destinations.html">Destinations</a>
                <a href="Activities.html">Activities</a>
                <a href="About.html" style="text-decoration: none;">About</a>
                <a href="Contact.html">Contact Me</a>
            </nav>
            <div class="section">
            <h2>Discover Incredible India</h2>
            <p>Experience the rich culture, diverse landscapes, and timeless beauty of Bharat</p>
            </div>
        </div>
    </body>
</html>
