<!DOCTYPE html>
<html>
    <head>
        <script src="verify.js"></script>
        <style>
            *{
                font-family: Arial, Helvetica, sans-serif;
            }
            body{
                margin: 0;
                justify-content:center;
                display: flex;
                align-items:center;
                height:100vh;
            }
            .content{
                background:white;
                padding:40px;
                width:500px;
                text-align:center;
                border-radius:15px;
                box-shadow:0 10px 25px rgba(0,0,0,0.2);
            }
            button{
                background-color: beige;
                color: black;
                width: fit-content;
                padding: 10px;
                border-color: beige;
                border-radius: 10px;
            }
            button:hover{
                background-color: blue;
                color: white;
            }
            label{
                display:block;
                text-align:left;
                margin-top:10px;
            }
            input{
                width:100%;
                padding:8px;
                border-radius:8px;
                border:1px solid #ccc;
            } 
        </style>
    </head>
    <body>
     
        <div class="content">
        <h2>Sign in</h2><br>
        <form action="myIndex.html">
            <label class="form">Email</label>
            <input type="email" placeholder="Enter your Email" required/><br><br>
            <label class="form" >Phone Number</label>
            <input type="tel" placeholder="Enter Mobile Number" maxlength="10" pattern="{0-9}{10}" required/><br><br> 
            <label class="form">Create Password </label>
            <input type="password" placeholder="Enter Password" maxlength="6"/><br><br>
            <button type="submit" onclick="verify()">Submit</button>
        </form>
        
        </div>
    </body>
</html>
